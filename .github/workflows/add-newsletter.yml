name: Add Newsletter

on:
  workflow_dispatch:
    inputs:
      doc_url:
        description: 'Published Google Doc URL (required)'
        required: true
        type: string
      override_year:
        description: 'LEAVE EMPTY unless correcting — override year (e.g. 2026)'
        required: false
        type: string
      override_month:
        description: 'LEAVE EMPTY unless correcting — override month number (e.g. 04)'
        required: false
        type: string

jobs:
  add-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - uses: actions/checkout@v4

      - name: Calculate month and year
        id: calc
        run: |
          if [ -n "${{ inputs.override_year }}" ] && [ -n "${{ inputs.override_month }}" ]; then
            YEAR="${{ inputs.override_year }}"
            MONTH="${{ inputs.override_month }}"
          else
            CURRENT_MONTH=$(date +%-m)
            CURRENT_YEAR=$(date +%Y)
            if [ "$CURRENT_MONTH" -eq 12 ]; then
              MONTH="01"
              YEAR=$((CURRENT_YEAR + 1))
            else
              NEXT=$((CURRENT_MONTH + 1))
              MONTH=$(printf '%02d' "$NEXT")
              YEAR="$CURRENT_YEAR"
            fi
          fi

          SLUG="${YEAR}-${MONTH}"

          MONTH_NAMES="January February March April May June July August September October November December"
          TITLE=$(echo "$MONTH_NAMES" | tr ' ' '\n' | sed -n "${MONTH#0}p")
          TITLE="${TITLE} ${YEAR}"

          echo "year=$YEAR" >> "$GITHUB_OUTPUT"
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          echo "Adding newsletter: $TITLE ($SLUG)"

      - name: Validate inputs
        run: |
          if ! echo "${{ inputs.doc_url }}" | grep -qE '^https://docs\.google\.com/document/d/(e/)?[A-Za-z0-9_-]+/pub$'; then
            echo "::error::Invalid Google Doc URL — must be a published Google Doc link ending in /pub"
            exit 1
          fi
          if ! echo "${{ steps.calc.outputs.slug }}" | grep -qE '^[0-9]{4}-(0[1-9]|1[0-2])$'; then
            echo "::error::Invalid slug '${{ steps.calc.outputs.slug }}' — must be YYYY-MM"
            exit 1
          fi

      - name: Check for duplicates
        run: |
          if grep -q "^${{ steps.calc.outputs.slug }}," issues.csv; then
            echo "::error::Slug ${{ steps.calc.outputs.slug }} already exists in issues.csv"
            exit 1
          fi
          if grep -qF "${{ inputs.doc_url }}" issues.csv; then
            echo "::error::This Google Doc URL already exists in issues.csv"
            exit 1
          fi

      - name: Add to issues.csv
        run: |
          echo "${{ steps.calc.outputs.slug }},${{ steps.calc.outputs.title }},${{ inputs.doc_url }},pre-release" >> issues.csv

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues.csv
          git commit -m "Add newsletter: ${{ steps.calc.outputs.title }} (${{ steps.calc.outputs.slug }}) [skip ci]"
          git push

  deploy:
    needs: add-newsletter
    permissions:
      contents: write
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
